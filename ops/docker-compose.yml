version: '3.8'

services:
  # Prometheus - metrics storage and querying
  prometheus:
    image: prom/prometheus:latest
    container_name: rustyblox-prometheus
    ports:
      - "9091:9090"  # Using 9091 to avoid conflicts
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - rustyblox-monitoring

  # Grafana - visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: rustyblox-grafana
    ports:
      - "3002:3000"  # Using 3002 to avoid conflicts (3000: existing Grafana, 3001: frontend)
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in environment}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - rustyblox-monitoring

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  rustyblox-monitoring:
    driver: bridge
