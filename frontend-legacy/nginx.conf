# Per-IP rate limiting (P1-2). Two shared-memory zones keyed on the client IP:
#   api      - general read API traffic
#   broadcast- the unauthenticated node-broadcast proxies (/sendtx, /relaymnb),
#              which forward straight to the upstream PIVX node and must be
#              throttled much harder.
# `burst` absorbs short spikes; `nodelay` serves the burst immediately and only
# rejects (503) once the burst budget is exhausted. The backend additionally
# enforces global + broadcast concurrency caps in-process, so this is the first
# of two defence layers.
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=broadcast:10m rate=2r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Node-broadcast proxies: throttled hard (longest-prefix match wins, so
    # these win over /api/ below). /sendtx covers both the GET (/sendtx/<hex>)
    # and POST (/sendtx) forms.
    location /api/v2/sendtx {
        limit_req zone=broadcast burst=5 nodelay;
        proxy_pass http://rustyblox:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v2/relaymnb {
        limit_req zone=broadcast burst=5 nodelay;
        proxy_pass http://rustyblox:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API proxy to the backend container
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://rustyblox:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://rustyblox:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
